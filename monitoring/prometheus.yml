global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: docai-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:5001"]
        labels:
          service: docai-backend

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
